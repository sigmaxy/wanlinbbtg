<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>预约行事历</title>
    <!-- 引入 Telegram Web App JS SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* 使用 Telegram 主题颜色作为备用，优先使用 Tailwind 的颜色 */
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: var(--tg-theme-secondary-bg-color, #f1f1f1);
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .calendar-container {
            flex-grow: 1;
            width: 100%;
            position: relative;
            /* 让 iframe 占满剩余空间 */
            overflow: hidden; 
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 简单的加载动画 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--tg-theme-button-color, #3498db);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="text-xl font-bold">查看我的空闲时间</h1>
        <p class="text-sm opacity-75 mt-1" id="user-greeting">请查看下方日历</p>
    </div>

    <div class="calendar-container">
        <!-- 加载动画，当 iframe 加载完成后会被遮盖 -->
        <div class="loader"></div>
        
        <!-- 
          请将下方 src 替换成你 Google Calendar 设置中的「内嵌网址」
          建议加上参数 mode=WEEK 来预设显示周视图，更适合查看时段
        -->
        <iframe 
            src="https://calendar.google.com/calendar/embed?height=600&wkst=1&bgcolor=%23ffffff&ctz=Asia%2FTaipei&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=1&showCalendars=0&showTz=0&mode=WEEK&src=YOUR_CALENDAR_ID_HERE%40group.calendar.google.com" 
            onload="document.querySelector('.loader').style.display='none';"
        ></iframe>
    </div>

    <script>
        // 初始化 Telegram Web App
        const tg = window.Telegram.WebApp;

        // 通知 Telegram 应用程序 Web App 已准备就绪
        tg.ready();

        // 展开 Web App 到全屏幕高度 (可选，但建议)
        tg.expand();

        // 尝试获取用户名称来打招呼
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const userName = tg.initDataUnsafe.user.first_name;
            document.getElementById('user-greeting').textContent = `嗨，${userName}！请查看空闲时段`;
        }

        // 设置 Telegram 主按钮 (可选：如果想让用户选完后点击确认)
        /*
        tg.MainButton.text = "我已确认空闲时间";
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            // 在这里可以发送数据回 Bot 或关闭 Web App
            // tg.sendData("checked_calendar"); 
            tg.close();
        });
        */
    </script>
</body>
</html>
