<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>預約行事曆</title>
    <!-- 引入 Telegram Web App JS SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* 使用 Telegram 主題顏色作為備用，優先使用 Tailwind 的顏色 */
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: var(--tg-theme-secondary-bg-color, #f1f1f1);
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .calendar-container {
            flex-grow: 1;
            width: 100%;
            position: relative;
            /* 讓 iframe 佔滿剩餘空間 */
            overflow: hidden; 
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 簡單的載入動畫 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--tg-theme-button-color, #3498db);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="text-xl font-bold">查看我的空閒時間</h1>
        <p class="text-sm opacity-75 mt-1" id="user-greeting">請查看下方日曆</p>
    </div>

    <div class="calendar-container">
        <!-- 載入動畫，當 iframe 載入完成後會被遮蓋 -->
        <div class="loader"></div>
        
        <!-- 
          請將下方 src 替換成你 Google Calendar 設定中的「內嵌網址」
          建議加上參數 mode=WEEK 來預設顯示週視圖，更適合查看時段
        -->
        <iframe src="https://calendar.google.com/calendar/embed?src=e6552043a7bba9fb1a82a5fd45b7b7e79b9790ea8351b73d9aeac4bb851ded66%40group.calendar.google.com&ctz=Asia%2FHong_Kong" 
                style="border: 0" 
                frameborder="0" 
                scrolling="no">
        </iframe>
    </div>

    <script>
        // 初始化 Telegram Web App
        const tg = window.Telegram.WebApp;

        // 通知 Telegram 應用程式 Web App 已準備就緒
        tg.ready();

        // 展開 Web App 到全螢幕高度 (可選，但建議)
        tg.expand();

        // 嘗試獲取使用者名稱來打招呼
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const userName = tg.initDataUnsafe.user.first_name;
            document.getElementById('user-greeting').textContent = `嗨，${userName}！請查看空閒時段`;
        }

        // 設定 Telegram 主按鈕 (可選：如果想讓使用者選完後點擊確認)
        /*
        tg.MainButton.text = "我已確認空閒時間";
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            // 在這裡可以發送資料回 Bot 或關閉 Web App
            // tg.sendData("checked_calendar"); 
            tg.close();
        });
        */
    </script>
</body>
</html>
